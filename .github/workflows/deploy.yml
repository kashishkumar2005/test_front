# This file is used to deploy the application

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          cd normal-react
          npm install --legacy-peer-deps

      - name: Build
        run: |
          cd normal-react
          npm run build

      - name: Deploy
        run: echo 'Deploying...'
